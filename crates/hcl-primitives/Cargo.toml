[package]
name = "hcl-primitives"
version = "0.0.3"
authors = ["Martin Ohmann <martinohmann@gmail.com>"]
license = "MIT OR Apache-2.0"
description = "Primitives used by the HCL sub-languages"
repository = "https://github.com/martinohmann/hcl-rs"
documentation = "https://docs.rs/hcl-primitives/"
keywords = ["hcl"]
categories = ["encoding"]
readme = "README.md"
edition = "2021"
include = [
  "CHANGELOG.md",
  "Cargo.toml",
  "LICENSE*",
  "README.md",
  "benches/**/*",
  "examples/**/*",
  "src/**/*",
  "tests/**/*"
]

[package.metadata.docs.rs]
rustdoc-args = ["--cfg", "docsrs"]
all-features = true

[package.metadata.release]
pre-release-replacements = [
  {file="CHANGELOG.md", search="Unreleased", replace="{{version}}", min=1},
  {file="CHANGELOG.md", search="\\.\\.\\.HEAD", replace="...{{tag_name}}", exactly=1},
  {file="CHANGELOG.md", search="ReleaseDate", replace="{{date}}", min=1},
  {file="CHANGELOG.md", search="<!-- next-header -->", replace="<!-- next-header -->\n## [Unreleased] - ReleaseDate\n", exactly=1},
  {file="CHANGELOG.md", search="<!-- next-url -->", replace="<!-- next-url -->\n[Unreleased]: https://github.com/martinohmann/hcl-rs/compare/{{tag_name}}...HEAD", exactly=1},
]

[features]
default = ["std"]
std = ["serde?/std"]
perf = ["std", "dep:kstring"]
serde = ["dep:serde", "kstring?/serde"]

[dependencies]
itoa = "1.0.5"
kstring = { version = "2.0.0", features = ["max_inline"], optional = true }
serde = { version = "1.0.154", default-features = false, features = ["alloc", "derive"], optional = true }
unicode-ident = "1.0.6"
ryu = "1.0.12"
