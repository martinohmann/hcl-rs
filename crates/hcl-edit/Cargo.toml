[package]
name = "hcl-edit"
version = "0.4.2"
authors = ["Martin Ohmann <martinohmann@gmail.com>"]
license = "MIT OR Apache-2.0"
description = "Parse and modify HCL while preserving comments and whitespace"
repository = "https://github.com/martinohmann/hcl-rs"
documentation = "https://docs.rs/hcl-edit/"
keywords = ["hcl"]
categories = ["encoding"]
readme = "README.md"
edition = "2021"
include = [
  "CHANGELOG.md",
  "Cargo.toml",
  "LICENSE*",
  "README.md",
  "benches/**/*",
  "examples/**/*",
  "src/**/*",
  "tests/**/*"
]

[package.metadata.docs.rs]
rustdoc-args = ["--cfg", "docsrs"]
all-features = true

[package.metadata.release]
pre-release-replacements = [
  {file="CHANGELOG.md", search="Unreleased", replace="{{version}}", min=1},
  {file="CHANGELOG.md", search="\\.\\.\\.HEAD", replace="...{{tag_name}}", exactly=1},
  {file="CHANGELOG.md", search="ReleaseDate", replace="{{date}}", min=1},
  {file="CHANGELOG.md", search="<!-- next-header -->", replace="<!-- next-header -->\n## [Unreleased] - ReleaseDate\n", exactly=1},
  {file="CHANGELOG.md", search="<!-- next-url -->", replace="<!-- next-url -->\n[Unreleased]: https://github.com/martinohmann/hcl-rs/compare/{{tag_name}}...HEAD", exactly=1},
]

[features]
default = []
perf = ["hcl-primitives/perf"]

[dependencies]
hcl-primitives = { version = "0.0.3", path = "../hcl-primitives" }
vecmap-rs = "0.1.10"
winnow = "0.4.1"

[dev-dependencies]
indoc = "2.0"
pretty_assertions = "1.3.0"
testdata = { path = "../testdata" }
